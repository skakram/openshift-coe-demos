kind: StorageClass
apiVersion: storage.k8s.io/v1
metadata:
  name: sc-gold-dc1
  annotations:
    kubernetes.io/description: Hitachi Storage Plug-in for Containers
    storageclass.kubernetes.io/is-default-class: 'false'
    storageclass.kubevirt.io/is-default-virt-class: 'true'
provisioner: hspc.csi.hitachi.com
parameters:
  csi.storage.k8s.io/fstype: ext4
  csi.storage.k8s.io/provisioner-secret-namespace: hspc01
  csi.storage.k8s.io/provisioner-secret-name: secret-dc1-e1090
  csi.storage.k8s.io/node-stage-secret-name: secret-dc1-e1090
  csi.storage.k8s.io/controller-expand-secret-name: secret-dc1-e1090
  csi.storage.k8s.io/node-publish-secret-namespace: hspc01
  csi.storage.k8s.io/controller-publish-secret-name: secret-dc1-e1090
  csi.storage.k8s.io/controller-publish-secret-namespace: hspc01
  poolID: '0'
  csi.storage.k8s.io/node-publish-secret-name: secret-dc1-e1090
  connectionType: fc
  csi.storage.k8s.io/controller-expand-secret-namespace: hspc01
  portID: 'CL1-A,CL2-A'
  serialNumber: '745691'
  csi.storage.k8s.io/node-stage-secret-namespace: hspc01
reclaimPolicy: Delete
allowVolumeExpansion: true
volumeBindingMode: Immediate
 
